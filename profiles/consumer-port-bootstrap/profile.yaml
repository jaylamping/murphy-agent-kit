version: "1.1.3"
name: consumer-port-bootstrap
description: >
  Bootstrap profile for fan360-consumer → Quarkus port: repository setup,
  Jira hierarchy completion, readonly discovery, and playbook creation.
  Fan360 peer house style; applies Murphy non-production-first (QA locally).
  Shepherd glance advisory after ≥3 merges (does not pause flow).
  No implementation Stories run under this profile.
terminology:
  epic: Epic
  story: Story
  subtask: Subtask
trackerFields:
  inheritanceFromEpic: FAN360-13796
  githubOrg: sporting-innovations
  serviceRepo: sporting-innovations/consumer-service
  requiredMatchFields:
    - Team
    - Assignee
    - Product Feature
    - Labels
    - Goals
  labels:
    - fan360-consumer-uplift
rolePolicy:
  shepherdCheckpointEvery:
    min: 3
    max: 3
  shepherdCheckpointBlocking: false
  oneStoryOnePr: true
  noSelfApproval: true
  noAutomaticMerge: true
  maxReviewLoops: 3
  maxFixLoops: 3
requiredReferences:
  - JIRA.md
  - QUARKUS.md
  - REGRESSION.md
qualityGates:
  - jira-inheritance
  - discovery-citations
  - no-implementation-dispatch
templates:
  story: templates/story.md
wipLimits:
  storyLanes: 1
  pupsPerStory: 1
  noses: 8
  leads: 1
  judges: 2
  sharedFoundationLanes: 1
domain:
  phase: bootstrap
  allowImplementation: false
