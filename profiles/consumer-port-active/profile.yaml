version: "1.1.2"
name: consumer-port-active
description: >
  Active implementation profile after discovery/playbook freeze.
  Fan360 peer Quarkus house style; Murphy non-production-first (QA locally);
  Principal checkpoint every 5–7 merged Stories; qualified hard maxima for parallel lanes.
terminology:
  epic: Epic
  story: Story
  subtask: Subtask
trackerFields:
  inheritanceFromEpic: FAN360-13796
  githubOrg: sporting-innovations
  serviceRepo: sporting-innovations/consumer-service
  requiredMatchFields:
    - Team
    - Assignee
    - Product Feature
    - Labels
    - Goals
  labels:
    - fan360-consumer-uplift
rolePolicy:
  principalCheckpointEvery:
    min: 5
    max: 7
  oneStoryOnePr: true
  noSelfApproval: true
  noAutomaticMerge: true
  maxReviewLoops: 3
  maxFixLoops: 3
requiredReferences:
  - JIRA.md
  - QUARKUS.md
  - REGRESSION.md
qualityGates:
  - jira-inheritance
  - discovery-citations
  - story-tests
  - architect-approval
  - principal-checkpoint
  - regression-parity
templates:
  story: templates/story.md
wipLimits:
  storyLanes: 4
  juniorsPerStory: 3
  interns: 8
  seniors: 2
  architects: 2
  sharedFoundationLanes: 1
domain:
  phase: active
  allowImplementation: true
