version: "1.1.3"
name: consumer-port-active
description: >
  Active implementation profile after discovery/playbook freeze.
  Fan360 peer Quarkus house style; Murphy non-production-first (QA locally);
  Shepherd glance advisory after ≥3 merged Stories (does not pause flow);
  hard stops only for crucial gates; qualified hard maxima for parallel lanes.
terminology:
  epic: Epic
  story: Story
  subtask: Subtask
trackerFields:
  inheritanceFromEpic: FAN360-13796
  githubOrg: sporting-innovations
  serviceRepo: sporting-innovations/consumer-service
  requiredMatchFields:
    - Team
    - Assignee
    - Product Feature
    - Labels
    - Goals
  labels:
    - fan360-consumer-uplift
rolePolicy:
  shepherdCheckpointEvery:
    min: 3
    max: 3
  shepherdCheckpointBlocking: false
  oneStoryOnePr: true
  noSelfApproval: true
  noAutomaticMerge: true
  maxReviewLoops: 3
  maxFixLoops: 3
requiredReferences:
  - JIRA.md
  - QUARKUS.md
  - REGRESSION.md
qualityGates:
  - jira-inheritance
  - discovery-citations
  - story-tests
  - judge-approval
  - shepherd-checkpoint
  - regression-parity
templates:
  story: templates/story.md
wipLimits:
  storyLanes: 4
  pupsPerStory: 3
  noses: 8
  leads: 2
  judges: 2
  sharedFoundationLanes: 1
domain:
  phase: active
  allowImplementation: true
